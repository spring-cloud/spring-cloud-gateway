spring:
  cloud:
    gateway.server.webflux:
      routes:
        - id: cors_preflight_test
          uri: ${test.uri}
          predicates:
            - Path=/abc/**
          metadata:
            cors:
              allowedOrigins: 'domain.com'
              allowedMethods: [ GET, POST ]
              allowedHeaders: '*'
              allowCredentials: true
              maxAge: 30
        - id: cors_test
          uri: ${test.uri}
          predicates:
            - Path=/cors/**
          filters:
            - StripPrefix=1
          metadata:
            cors:
              allowedOrigins: https://test.com
              allowedMethods:
                - GET
                - PUT
              allowedHeaders: '*'
        - id: cors_host_a
          uri: ${test.uri}
          predicates:
            - Host=hosta.example.com
          metadata:
            cors:
              allowedOrigins: 'https://origin-a.com'
              allowedMethods:
                - GET
        - id: cors_host_b
          uri: ${test.uri}
          predicates:
            - Host=hostb.example.com
          metadata:
            cors:
              allowedOrigins: 'https://origin-b.com'
              allowedMethods:
                - POST
