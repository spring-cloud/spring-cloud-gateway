test:
  hostport: httpbin.org:80
  #  hostport: localhost:5000
  #  uri: http://${test.hostport}
  uri: lb://testservice

spring:
  web:
    error:
      include-message: always
  profiles:
    group:
      - logging

  cloud:
    gateway.server.webflux:
      default-filters:
        - AddResponseHeader=X-Response-Default-Foo, Default-Bar
        - PrefixPath=/httpbin
      routes:
        - id: cors_preflight_test
          uri: ${test.uri}
          predicates:
            - Path=/abc/**
          metadata:
            cors:
              allowedOrigins: 'domain.com'
              allowedMethods: [ GET, POST ]
              allowedHeaders: '*'
              allowCredentials: true
              maxAge: 30
        - id: cors_test
          uri: ${test.uri}
          predicates:
            - Path=/cors/**
          filters:
            - StripPrefix=1
          metadata:
            cors:
              allowedOrigins: https://test.com
              allowedMethods:
                - GET
                - PUT
              allowedHeaders: '*'

management:
  endpoints:
    web:
      exposure:
        include: "*"